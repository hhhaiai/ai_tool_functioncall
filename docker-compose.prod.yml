services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-gateway-prod
    restart: always
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64m,mode=1777
    ports:
      # Keep the raw Gateway listener private on the server. Public clients
      # enter through Nginx on 80/443 so TLS, rate limits, and SSE proxy rules
      # cannot be bypassed. Operators can still reach it over localhost.
      - "127.0.0.1:${GATEWAY_PORT:-8885}:8885"
    environment:
      # Upstream API configuration
      - UPSTREAM_BASE_URL=${UPSTREAM_BASE_URL:?set UPSTREAM_BASE_URL}
      - UPSTREAM_API_KEY=${UPSTREAM_API_KEY:?set UPSTREAM_API_KEY}
      - UPSTREAM_MODEL=${UPSTREAM_MODEL:?set UPSTREAM_MODEL}
      - UPSTREAM_RETRY_MAX_ATTEMPTS=${UPSTREAM_RETRY_MAX_ATTEMPTS:-3}
      - UPSTREAM_RETRY_INITIAL_DELAY=${UPSTREAM_RETRY_INITIAL_DELAY:-0.5}
      - UPSTREAM_RETRY_MAX_DELAY=${UPSTREAM_RETRY_MAX_DELAY:-4.0}
      - UPSTREAM_RETRY_MAX_ELAPSED=${UPSTREAM_RETRY_MAX_ELAPSED:-90.0}
      - UPSTREAM_MAX_INPUT_TOKENS=${UPSTREAM_MAX_INPUT_TOKENS:-1048576}
      - UPSTREAM_MAX_OUTPUT_TOKENS=${UPSTREAM_MAX_OUTPUT_TOKENS:-131072}
      - UPSTREAM_MAX_RESPONSE_BYTES=${UPSTREAM_MAX_RESPONSE_BYTES:-33554432}
      - UPSTREAM_MAX_STDERR_BYTES=${UPSTREAM_MAX_STDERR_BYTES:-262144}
      - UPSTREAM_MAX_STREAM_EVENT_BYTES=${UPSTREAM_MAX_STREAM_EVENT_BYTES:-1048576}
      - UPSTREAM_MAX_STREAM_EVENTS=${UPSTREAM_MAX_STREAM_EVENTS:-100000}
      - GATEWAY_UPSTREAM_PROTOCOL=${GATEWAY_UPSTREAM_PROTOCOL:-openai_chat}
      - UPSTREAM_PROTOCOL=${UPSTREAM_PROTOCOL:-openai_chat}
      # Gateway configuration
      - GATEWAY_PORT=8885
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_PUBLIC_EXPOSURE=external
      - GATEWAY_ADMIN_PASSWORD=${GATEWAY_ADMIN_PASSWORD:?set GATEWAY_ADMIN_PASSWORD}
      - GATEWAY_TOOL_MODE=${GATEWAY_TOOL_MODE:-orchestrate}
      - GATEWAY_TOOLS_ENABLED=${GATEWAY_TOOLS_ENABLED:-adapter}
      - UPSTREAM_SUPPORTS_TOOLS=${UPSTREAM_SUPPORTS_TOOLS:-0}
      - UPSTREAM_SUPPORTS_FUNCTION_CALLS=${UPSTREAM_SUPPORTS_FUNCTION_CALLS:-0}
      - UPSTREAM_SUPPORTS_PARALLEL_TOOL_CALLS=${UPSTREAM_SUPPORTS_PARALLEL_TOOL_CALLS:-0}
      - GATEWAY_MAX_TOOL_ROUNDS=${GATEWAY_MAX_TOOL_ROUNDS:-10}
      - GATEWAY_MAX_CONCURRENT_REQUESTS=${GATEWAY_MAX_CONCURRENT_REQUESTS:-32}
      - GATEWAY_CONCURRENCY_BACKEND=${GATEWAY_CONCURRENCY_BACKEND:-sqlite}
      - GATEWAY_CONCURRENCY_DB_PATH=${GATEWAY_CONCURRENCY_DB_PATH:-/app/data/runtime/admission.sqlite3}
      - GATEWAY_CONCURRENCY_FALLBACK_BACKEND=${GATEWAY_CONCURRENCY_FALLBACK_BACKEND:-none}
      - GATEWAY_CONCURRENCY_BUSY_TIMEOUT_MS=${GATEWAY_CONCURRENCY_BUSY_TIMEOUT_MS:-1000}
      - GATEWAY_CONCURRENCY_LEASE_TTL_SECONDS=${GATEWAY_CONCURRENCY_LEASE_TTL_SECONDS:-120}
      - GATEWAY_CONCURRENCY_HEARTBEAT_SECONDS=${GATEWAY_CONCURRENCY_HEARTBEAT_SECONDS:-30}
      - GATEWAY_CONCURRENCY_QUEUE_TIMEOUT=${GATEWAY_CONCURRENCY_QUEUE_TIMEOUT:-5}
      - GATEWAY_CONCURRENCY_ENABLED=${GATEWAY_CONCURRENCY_ENABLED:-1}
      - GATEWAY_CONCURRENCY_MAX_CONNECTIONS=${GATEWAY_CONCURRENCY_MAX_CONNECTIONS:-100}
      - GATEWAY_CONCURRENCY_MAX_CONNECTIONS_PER_HOST=${GATEWAY_CONCURRENCY_MAX_CONNECTIONS_PER_HOST:-10}
      - GATEWAY_CONCURRENCY_RETRY_COUNT=${GATEWAY_CONCURRENCY_RETRY_COUNT:-2}
      - GATEWAY_CONCURRENCY_RETRY_DELAY=${GATEWAY_CONCURRENCY_RETRY_DELAY:-1.0}
      - GATEWAY_CONCURRENCY_STRATEGY=${GATEWAY_CONCURRENCY_STRATEGY:-round_robin}
      - GATEWAY_MULTI_UPSTREAM_ENABLED=${GATEWAY_MULTI_UPSTREAM_ENABLED:-0}
      - GATEWAY_MULTI_UPSTREAM_MAX_ATTEMPTS=${GATEWAY_MULTI_UPSTREAM_MAX_ATTEMPTS:-0}
      - GATEWAY_MULTI_UPSTREAM_FAILURE_THRESHOLD=${GATEWAY_MULTI_UPSTREAM_FAILURE_THRESHOLD:-3}
      - GATEWAY_MULTI_UPSTREAM_RECOVERY_SECONDS=${GATEWAY_MULTI_UPSTREAM_RECOVERY_SECONDS:-30.0}
      - GATEWAY_PERSISTENCE_ENABLED=${GATEWAY_PERSISTENCE_ENABLED:-1}
      - GATEWAY_PERSISTENCE_DB_PATH=${GATEWAY_PERSISTENCE_DB_PATH:-/app/data/runtime/gateway.db}
      - GATEWAY_ASSISTANTS_DB_PATH=${GATEWAY_ASSISTANTS_DB_PATH:-/app/data/runtime/assistants.sqlite3}
      - GATEWAY_ASSISTANTS_RETENTION_DAYS=${GATEWAY_ASSISTANTS_RETENTION_DAYS:-30}
      - GATEWAY_ASSISTANTS_MAX_ROWS=${GATEWAY_ASSISTANTS_MAX_ROWS:-50000}
      - GATEWAY_CACHE_ENABLED=${GATEWAY_CACHE_ENABLED:-1}
      - GATEWAY_CACHE_MAX_ENTRIES=${GATEWAY_CACHE_MAX_ENTRIES:-1000}
      - GATEWAY_CACHE_SIMILARITY_THRESHOLD=${GATEWAY_CACHE_SIMILARITY_THRESHOLD:-0.92}
      - GATEWAY_CACHE_TTL_SECONDS=${GATEWAY_CACHE_TTL_SECONDS:-3600}
      - GATEWAY_EMBEDDING_URL=${GATEWAY_EMBEDDING_URL:-}
      - GATEWAY_EMBEDDING_MODEL=${GATEWAY_EMBEDDING_MODEL:-default}
      - GATEWAY_EMBEDDING_API_KEY=${GATEWAY_EMBEDDING_API_KEY:-}
      - GATEWAY_INTELLIGENCE_ENABLED=${GATEWAY_INTELLIGENCE_ENABLED:-1}
      - GATEWAY_INTELLIGENCE_REFLECTION=${GATEWAY_INTELLIGENCE_REFLECTION:-1}
      - GATEWAY_INTELLIGENCE_DECOMPOSITION=${GATEWAY_INTELLIGENCE_DECOMPOSITION:-1}
      - GATEWAY_INTELLIGENCE_QUALITY=${GATEWAY_INTELLIGENCE_QUALITY:-1}
      - GATEWAY_INTELLIGENCE_MAX_REFLECTION_TOKENS=${GATEWAY_INTELLIGENCE_MAX_REFLECTION_TOKENS:-500}
      - GATEWAY_INTELLIGENCE_MAX_DECOMPOSITION_PARTS=${GATEWAY_INTELLIGENCE_MAX_DECOMPOSITION_PARTS:-5}
      - GATEWAY_INTELLIGENCE_QUALITY_THRESHOLD=${GATEWAY_INTELLIGENCE_QUALITY_THRESHOLD:-0.6}
      - GATEWAY_INTELLIGENCE_USE_LLM=${GATEWAY_INTELLIGENCE_USE_LLM:-0}
      - GATEWAY_INTELLIGENCE_PROVIDER=${GATEWAY_INTELLIGENCE_PROVIDER:-gateway_upstream}
      - GATEWAY_INTELLIGENCE_MODEL=${GATEWAY_INTELLIGENCE_MODEL:-}
      - GATEWAY_INTELLIGENCE_LLM_TIMEOUT=${GATEWAY_INTELLIGENCE_LLM_TIMEOUT:-15.0}
      - GATEWAY_INTELLIGENCE_MAX_INPUT_CHARS=${GATEWAY_INTELLIGENCE_MAX_INPUT_CHARS:-20000}
      - GATEWAY_INTELLIGENCE_TEMPERATURE=${GATEWAY_INTELLIGENCE_TEMPERATURE:-0.0}
      - GATEWAY_INTELLIGENCE_STRICT_MODE=${GATEWAY_INTELLIGENCE_STRICT_MODE:-0}
      - GATEWAY_STATS_ENABLED=${GATEWAY_STATS_ENABLED:-1}
      - GATEWAY_STATS_RETENTION_DAYS=${GATEWAY_STATS_RETENTION_DAYS:-30}
      - GATEWAY_WEB2API_ENABLED=${GATEWAY_WEB2API_ENABLED:-1}
      - GATEWAY_WEB2API_MAX_CONCURRENT=${GATEWAY_WEB2API_MAX_CONCURRENT:-5}
      - GATEWAY_WEB2API_CACHE_TTL=${GATEWAY_WEB2API_CACHE_TTL:-300}
      - GATEWAY_WEB2API_TIMEOUT=${GATEWAY_WEB2API_TIMEOUT:-30}
      - GATEWAY_WEB2API_MAX_CONTENT_BYTES=${GATEWAY_WEB2API_MAX_CONTENT_BYTES:-5242880}
      - GATEWAY_WEB2API_MAX_CACHE_ENTRIES=${GATEWAY_WEB2API_MAX_CACHE_ENTRIES:-256}
      - GATEWAY_WEB2API_USER_AGENT=${GATEWAY_WEB2API_USER_AGENT:-Gateway-Web2API/1.0}
      - GATEWAY_WEB2API_ALLOW_PRIVATE_NETWORK=${GATEWAY_WEB2API_ALLOW_PRIVATE_NETWORK:-0}
      - GATEWAY_WEB2API_ALLOW_REGEX=${GATEWAY_WEB2API_ALLOW_REGEX:-0}
      - GATEWAY_WEB2API_ALLOW_RAW_HTML=${GATEWAY_WEB2API_ALLOW_RAW_HTML:-0}
      - GATEWAY_AGENT_PLANNER_STRICT_EVERY_TURN=${GATEWAY_AGENT_PLANNER_STRICT_EVERY_TURN:-1}
      - GATEWAY_MAX_REQUEST_BODY_BYTES=${GATEWAY_MAX_REQUEST_BODY_BYTES:-67108864}
      - GATEWAY_CORS_ENABLED=${GATEWAY_CORS_ENABLED:-0}
      - GATEWAY_CORS_ALLOWED_ORIGINS=${GATEWAY_CORS_ALLOWED_ORIGINS:-}
      - GATEWAY_MAX_LOG_PAYLOAD_CHARS=${GATEWAY_MAX_LOG_PAYLOAD_CHARS:-200000}
      - GATEWAY_RATE_LIMIT_ENABLED=${GATEWAY_RATE_LIMIT_ENABLED:-1}
      - GATEWAY_RATE_LIMIT_RPM=${GATEWAY_RATE_LIMIT_RPM:-120}
      - GATEWAY_RATE_LIMIT_BACKEND=${GATEWAY_RATE_LIMIT_BACKEND:-sqlite}
      - GATEWAY_RATE_LIMIT_DB_PATH=${GATEWAY_RATE_LIMIT_DB_PATH:-/app/data/runtime/rate_limits.sqlite3}
      - GATEWAY_RATE_LIMIT_FALLBACK_BACKEND=${GATEWAY_RATE_LIMIT_FALLBACK_BACKEND:-memory}
      - GATEWAY_RATE_LIMIT_BUSY_TIMEOUT_MS=${GATEWAY_RATE_LIMIT_BUSY_TIMEOUT_MS:-1000}
      - GATEWAY_RATE_LIMIT_STATE_TTL_SECONDS=${GATEWAY_RATE_LIMIT_STATE_TTL_SECONDS:-3600}
      - GATEWAY_MCP_MAX_HEADER_BYTES=${GATEWAY_MCP_MAX_HEADER_BYTES:-65536}
      - GATEWAY_MCP_MAX_MESSAGE_BYTES=${GATEWAY_MCP_MAX_MESSAGE_BYTES:-16777216}
      - GATEWAY_MCP_MAX_STDERR_BYTES=${GATEWAY_MCP_MAX_STDERR_BYTES:-262144}
      - GATEWAY_MAINTENANCE_ENABLED=${GATEWAY_MAINTENANCE_ENABLED:-1}
      - GATEWAY_MAINTENANCE_INTERVAL_SECONDS=${GATEWAY_MAINTENANCE_INTERVAL_SECONDS:-300}
      - GATEWAY_MAINTENANCE_DRY_RUN=${GATEWAY_MAINTENANCE_DRY_RUN:-0}
      - GATEWAY_MAINTENANCE_BATCH_SIZE=${GATEWAY_MAINTENANCE_BATCH_SIZE:-1000}
      - GATEWAY_MAINTENANCE_MAX_BATCHES=${GATEWAY_MAINTENANCE_MAX_BATCHES:-4}
      - GATEWAY_MAINTENANCE_VACUUM_PAGES=${GATEWAY_MAINTENANCE_VACUUM_PAGES:-256}
      - GATEWAY_REQUEST_LOG_RETENTION_DAYS=${GATEWAY_REQUEST_LOG_RETENTION_DAYS:-30}
      - GATEWAY_REQUEST_LOG_MAX_ROWS=${GATEWAY_REQUEST_LOG_MAX_ROWS:-100000}
      - GATEWAY_TOOL_FAILURE_RETENTION_DAYS=${GATEWAY_TOOL_FAILURE_RETENTION_DAYS:-90}
      - GATEWAY_TOOL_FAILURE_MAX_ROWS=${GATEWAY_TOOL_FAILURE_MAX_ROWS:-50000}
      - GATEWAY_MEMORY_RETENTION_DAYS=${GATEWAY_MEMORY_RETENTION_DAYS:-90}
      - GATEWAY_MEMORY_MAX_ROWS=${GATEWAY_MEMORY_MAX_ROWS:-50000}
      - GATEWAY_PLANNER_RETENTION_DAYS=${GATEWAY_PLANNER_RETENTION_DAYS:-30}
      - GATEWAY_PLANNER_MAX_ROWS=${GATEWAY_PLANNER_MAX_ROWS:-20000}
      - GATEWAY_PLANNER_EVENT_MAX_ROWS=${GATEWAY_PLANNER_EVENT_MAX_ROWS:-100000}
      - GATEWAY_RUNTIME_CLEANUP_ENABLED=${GATEWAY_RUNTIME_CLEANUP_ENABLED:-0}
      - GATEWAY_RUNTIME_CLEANUP_DRY_RUN=${GATEWAY_RUNTIME_CLEANUP_DRY_RUN:-1}
      - GATEWAY_RUNTIME_RETENTION_DAYS=${GATEWAY_RUNTIME_RETENTION_DAYS:-7}
      - GATEWAY_RUNTIME_MAX_ENTRIES_PER_RUN=${GATEWAY_RUNTIME_MAX_ENTRIES_PER_RUN:-20}
      - GATEWAY_RUNTIME_MAX_ENTRY_BYTES=${GATEWAY_RUNTIME_MAX_ENTRY_BYTES:-268435456}
      # Context management
      - GATEWAY_CONTEXT_ENABLED=${GATEWAY_CONTEXT_ENABLED:-1}
      - GATEWAY_CONTEXT_MAX_INPUT_TOKENS=${GATEWAY_CONTEXT_MAX_INPUT_TOKENS:-1048576}
      - GATEWAY_CONTEXT_FANOUT_ENABLED=${GATEWAY_CONTEXT_FANOUT_ENABLED:-1}
      - GATEWAY_CONTEXT_FANOUT_CHUNK_TOKENS=${GATEWAY_CONTEXT_FANOUT_CHUNK_TOKENS:-120000}
      - GATEWAY_CLIENT_CONTEXT_WINDOW=${GATEWAY_CLIENT_CONTEXT_WINDOW:-1048576}
      - GATEWAY_CLIENT_AUTO_COMPACT_TOKEN_LIMIT=${GATEWAY_CLIENT_AUTO_COMPACT_TOKEN_LIMIT:-943718}
      - GATEWAY_CLIENT_OUTPUT_TOKEN_LIMIT=${GATEWAY_CLIENT_OUTPUT_TOKEN_LIMIT:-131072}
      - GATEWAY_TEXT_TOOL_ADAPTER_COMPACT_TOKEN_LIMIT=${GATEWAY_TEXT_TOOL_ADAPTER_COMPACT_TOKEN_LIMIT:-48000}
      # Tool configuration
      - GATEWAY_EXPOSE_BUILTIN_TOOLS=${GATEWAY_EXPOSE_BUILTIN_TOOLS:-1}
      - GATEWAY_ALLOW_WRITE_TOOLS=${GATEWAY_ALLOW_WRITE_TOOLS:-0}
      - GATEWAY_ALLOW_SHELL_TOOLS=${GATEWAY_ALLOW_SHELL_TOOLS:-0}
      - GATEWAY_EXECUTE_USER_SIDE_TOOLS=${GATEWAY_EXECUTE_USER_SIDE_TOOLS:-0}
      - GATEWAY_ADMIN_SKILLS_ROOT=${GATEWAY_ADMIN_SKILLS_ROOT:-/app/data/skills}
      - GATEWAY_TOOL_ENV_ALLOWLIST=${GATEWAY_TOOL_ENV_ALLOWLIST:-}
      - GATEWAY_SANDBOX_ISOLATION_BACKEND=${GATEWAY_SANDBOX_ISOLATION_BACKEND:-auto}
      - GATEWAY_SANDBOX_READ_POLICY=${GATEWAY_SANDBOX_READ_POLICY:-system_and_workspace}
      - GATEWAY_SANDBOX_DENY_READ_PATHS=${GATEWAY_SANDBOX_DENY_READ_PATHS:-}
      - GATEWAY_SANDBOX_TENANT_ROOT=${GATEWAY_SANDBOX_TENANT_ROOT:-/app/workspace}
      - GATEWAY_SANDBOX_NETWORK_POLICY=${GATEWAY_SANDBOX_NETWORK_POLICY:-inherited}
      - GATEWAY_SANDBOX_STARTUP_TIMEOUT=${GATEWAY_SANDBOX_STARTUP_TIMEOUT:-5}
      - GATEWAY_SANDBOX_CPU_SECONDS=${GATEWAY_SANDBOX_CPU_SECONDS:-}
      - GATEWAY_SANDBOX_MEMORY_BYTES=${GATEWAY_SANDBOX_MEMORY_BYTES:-}
      - GATEWAY_SANDBOX_MAX_PROCESSES=${GATEWAY_SANDBOX_MAX_PROCESSES:-}
      - GATEWAY_SANDBOX_MAX_OPEN_FILES=${GATEWAY_SANDBOX_MAX_OPEN_FILES:-256}
      - GATEWAY_SANDBOX_MAX_FILE_BYTES=${GATEWAY_SANDBOX_MAX_FILE_BYTES:-67108864}
      - GATEWAY_TOOL_CACHE_PERSIST_LOCAL_RESULTS=${GATEWAY_TOOL_CACHE_PERSIST_LOCAL_RESULTS:-0}
      # Streaming
      - GATEWAY_UPSTREAM_STREAM_AGGREGATE=${GATEWAY_UPSTREAM_STREAM_AGGREGATE:-1}
      # Memory
      - GATEWAY_MEMORY_ENABLED=${GATEWAY_MEMORY_ENABLED:-1}
      # Security
      - GATEWAY_DOWNSTREAM_KEY=${GATEWAY_DOWNSTREAM_KEY:?set GATEWAY_DOWNSTREAM_KEY}
    volumes:
      # Persist runtime data (logs, config, stats)
      - gateway-data:/app/data
      # Mount workspace for file tools
      - ${GATEWAY_WORKSPACE_ROOT:-./workspace}:/app/workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8885/readyz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
          pids: 256
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: gateway-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      gateway:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

volumes:
  gateway-data:
    driver: local
  nginx-cache:
    driver: local

networks:
  default:
    # The Python Gateway listens on 0.0.0.0 inside the container. Keep the
    # service network IPv4-only so Nginx does not first select an unreachable
    # container IPv6 address before falling back to IPv4.
    enable_ipv6: false
