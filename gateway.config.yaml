# ============================================================================
# AI Tool FunctionCall Gateway - 完整配置文件
# ============================================================================
# 使用方法：
#   1. 复制此文件: cp gateway.config.yaml .gateway_service.json
#   2. 修改配置项
#   3. 启动服务: ./scripts/mimo_gateway.sh start
#
# 优先级：环境变量 > 配置文件 > 默认值
# ============================================================================

# ----------------------------------------------------------------------------
# 管理员账号
# ----------------------------------------------------------------------------
admin:
  username: admin
  password: admin                    # 首次登录后请立即修改
  # password_hash: ""                # 或直接设置 hash（优先级高于 password）

# ----------------------------------------------------------------------------
# 上游服务（你的真实 LLM API）
# ----------------------------------------------------------------------------
upstream:
  base_url: ""                         # 真实/测试上游地址只放本地 .gateway_service.json 或环境变量，不提交
  api_key: ""                        # 例: <YOUR_UPSTREAM_API_KEY>
  model: "mimo-v2.5-pro"              # Mimo 默认模型
  protocol: openai_chat              # openai_chat | anthropic_messages | openai_responses
  tools_enabled: adapter             # Mimo Messages 可 forced tool_use；Codex/Responses function_call 未证实，默认走 Gateway 本地真实工具适配
  timeout_seconds: 60
  retry_max_attempts: 3              # 总尝试次数（含首次请求）
  retry_initial_delay_seconds: 0.5   # 指数退避初始延迟
  retry_max_delay_seconds: 4.0       # 单次重试最大延迟
  retry_max_elapsed_seconds: 90.0    # 整个上游请求/重试总时限
  max_input_tokens: 1048576
  max_output_tokens: 131072
  max_response_bytes: 33554432      # 非流式/聚合上游响应硬上限（32MB）
  max_stderr_bytes: 262144          # curl stderr 内存保留上限（256KB）
  max_stream_event_bytes: 1048576   # 单个 SSE event 上限（1MB）
  max_stream_events: 100000         # 单次上游流最大事件数
  max_concurrency: 32

  # 上游 API 路径（通常不需要修改）
  paths:
    models: /v1/models
    chat_completions: /v1/chat/completions
    responses: /v1/responses
    messages: /v1/messages

  # 上游能力声明（自动探测，通常不需要手动设置）
  capabilities:
    supports_streaming: true
    supports_tools: false
    supports_function_calls: false
    supports_parallel_tool_calls: false
    supports_vision: false
    supports_network: false
    supports_json_schema: true

# ----------------------------------------------------------------------------
# Gateway 核心配置
# ----------------------------------------------------------------------------
gateway:
  # 远端服务默认不持久化 workspace_root。
  # 每个请求应由 client 传入 workspace_root/gateway_workspace 或通过客户端环境元数据解析。
  # 缺失时 Gateway 会使用隔离 anonymous workspace，而不是服务机 cwd。
  # workspace_root: /absolute/client/workspace

  # 工具模式：orchestrate（本地编排）| passthrough（直通上游）
  tool_mode: orchestrate
  agent_planner_strict_every_turn: true

  # 工具权限
  allow_write_tools: false           # 允许文件写入工具；仅可信本地 coding-agent 场景开启
  allow_shell_tools: false           # 允许 Shell 执行工具；生产默认关闭
  tool_cache_persist_local_results: false  # 默认不把 Read/Grep 等本地文件内容写入 SQLite
  execute_user_side_tools_in_gateway: false  # 默认禁止在 Gateway 服务机执行用户侧文件/shell/GUI/local agent 工具
  allow_private_network_tools: false # 默认禁止 WebFetch/WebSearch/image_generation provider 访问 Gateway 服务端私网；仅管理员确认服务侧网络工具需要时开启

  # 工具执行
  max_tool_rounds: 10                # 最大工具调用轮数
  tool_execution_timeout_seconds: 60 # 单次工具执行超时
  max_concurrent_requests: 32        # 最大并发请求数
  concurrency_backend: sqlite       # sqlite 跨进程共享；memory 仅单进程
  concurrency_db_path: .gateway_runtime/admission.sqlite3
  concurrency_fallback_backend: none # 共享后端故障默认失败关闭；可显式设 memory 降级
  concurrency_busy_timeout_ms: 1000
  concurrency_lease_ttl_seconds: 120
  concurrency_heartbeat_seconds: 30
  concurrency_queue_timeout_seconds: 5
  max_request_body_bytes: 67108864   # POST 请求体读取前上限（默认 64MB，超限返回 413）
  cors_enabled: false                # 默认关闭浏览器跨域访问
  cors_allowed_origins: []           # 启用时仅允许精确 http(s) Origin，不支持通配符

  # 日志
  request_logging: true
  logging_backend: sqlite            # sqlite | jsonl
  max_log_payload_chars: 200000      # 单个 request/response 日志 payload 截断上限，防止 SQLite 膨胀
  rate_limit_enabled: true           # Python 请求路径按认证客户端限流
  rate_limit_rpm: 120                # 每个客户端/匿名来源每分钟请求数
  rate_limit_backend: sqlite         # sqlite 跨进程共享；memory 仅单进程/测试
  rate_limit_db_path: .gateway_runtime/rate_limits.sqlite3
  rate_limit_fallback_backend: memory # SQLite 暂不可用时保持有界的进程内保护
  rate_limit_busy_timeout_ms: 1000
  rate_limit_state_ttl_seconds: 3600
  sqlite_log_path: gateway_log.sqlite3

  # 本地规划器（自动分析代码上下文）
  local_planner_enabled: true
  local_planner_max_files: 24        # 最大分析文件数
  local_planner_max_bytes_per_file: 24000

  # 文本工具调用回退（当上游不支持或未稳定支持当前客户端协议的 tools 时）
  text_tool_call_fallback_enabled: true
  text_tool_adapter_compact_token_limit: 48000  # 弱上游文本工具适配前的专项压缩上限

  # 公开访问地址（用于生成客户端配置片段）
  public_base_url: http://127.0.0.1:8885

  # 下游 API Key（客户端连接 Gateway 用）
  client_snippet_api_key: ""         # 例: your-gateway-api-key

  # 模型别名
  downstream_model_alias: ""         # 客户端看到的模型名
  review_model_alias: ""             # 质量审查用的模型名

  # 客户端上下文窗口
  client_context_window: 1048576
  client_auto_compact_token_limit: 943718
  client_output_token_limit: 131072

# ----------------------------------------------------------------------------
# 上下文管理（长上下文压缩、记忆、扇出）
# ----------------------------------------------------------------------------
context:
  enabled: true
  max_input_tokens: 1048576          # Mimo 1M 上下文；超过此值触发压缩/扇出
  keep_recent_messages: 12           # 保留最近 N 条消息
  summary_max_chars: 6000            # 摘要最大字符数

  # 扇出（大请求拆分并行处理）
  fanout_enabled: true
  fanout_chunk_tokens: 120000        # 每块 token 数
  fanout_max_chunks: 0               # 0=不限制
  fanout_max_workers: 4              # 并行 worker 数

  # 质量审查
  quality_review_enabled: true

  # 对话记忆
  memory_enabled: true
  memory_max_items: 200
  memory_recall_limit: 8
  memory_inject_max_chars: 4000
  memory_summary_max_chars: 900

  # 长上下文专用上游（可选）
  route_to_long_context: true
  long_context_upstream:
    base_url: ""
    api_key: ""
    model: ""
    protocol: ""

# ----------------------------------------------------------------------------
# 持久化与 Assistants / Threads 生命周期
# ----------------------------------------------------------------------------
persistence:
  enabled: true
  db_path: .gateway_runtime/gateway.db

assistants:
  db_path: .gateway_runtime/assistants.sqlite3
  retention_days: 30
  max_rows: 50000

# ----------------------------------------------------------------------------
# 语义缓存
# ----------------------------------------------------------------------------
cache:
  enabled: true
  max_entries: 1000
  similarity_threshold: 0.92
  ttl_seconds: 3600
  embedding_url: ""
  embedding_model: default
  embedding_api_key: ""

# ----------------------------------------------------------------------------
# 智能分析（默认使用规则；LLM provider 显式启用）
# ----------------------------------------------------------------------------
intelligence:
  enabled: true
  reflection_enabled: true
  decomposition_enabled: true
  quality_assessment_enabled: true
  max_reflection_tokens: 500
  max_decomposition_parts: 5
  quality_threshold: 0.6
  use_llm: false
  provider: gateway_upstream
  model: ""
  llm_timeout: 15.0
  max_input_chars: 20000
  temperature: 0.0
  strict_mode: false

# ----------------------------------------------------------------------------
# 上游连接池、负载均衡与故障转移
# ----------------------------------------------------------------------------
concurrency:
  enabled: true
  max_connections: 100
  max_connections_per_host: 10
  retry_count: 2
  retry_delay: 1.0
  load_balance_strategy: round_robin
  multi_upstream_enabled: false
  multi_upstream_max_attempts: 0
  multi_upstream_failure_threshold: 3
  multi_upstream_recovery_seconds: 30.0

# ----------------------------------------------------------------------------
# 运行统计
# ----------------------------------------------------------------------------
stats:
  enabled: true
  track_requests: true
  track_tools: true
  track_cache: true
  track_quality: true
  retention_days: 30

# ----------------------------------------------------------------------------
# Web2API（默认禁止私网、正则和原始 HTML）
# ----------------------------------------------------------------------------
web2api:
  enabled: true
  max_concurrent: 5
  cache_ttl_seconds: 300
  request_timeout: 30
  max_content_bytes: 5242880
  max_cache_entries: 256
  user_agent: Gateway-Web2API/1.0
  allow_private_network: false
  allow_regex: false
  allow_raw_html: false

# ----------------------------------------------------------------------------
# 持久化数据维护
# ----------------------------------------------------------------------------
maintenance:
  enabled: true
  interval_seconds: 300
  dry_run: false
  batch_size: 1000
  max_batches_per_run: 4
  incremental_vacuum_pages: 256
  request_log_retention_days: 30
  request_log_max_rows: 100000
  tool_failure_retention_days: 90
  tool_failure_max_rows: 50000
  memory_retention_days: 90
  memory_max_rows: 50000
  planner_session_retention_days: 30
  planner_session_max_rows: 20000
  planner_event_max_rows: 100000
  # 只清理 Gateway 已知的 smoke/anonymous 临时目录；默认禁用并保持 dry-run。
  runtime_cleanup_enabled: false
  runtime_cleanup_dry_run: true
  runtime_retention_days: 7
  runtime_max_entries_per_run: 20
  runtime_max_entry_bytes: 268435456

# ----------------------------------------------------------------------------
# 下游 API Keys（客户端认证）
# ----------------------------------------------------------------------------
downstream_keys:
  # - name: default
  #   key: your-gateway-api-key
  #   enabled: true
  #   protocols: [models, chat_completions, responses, messages, direct_tools]

# ----------------------------------------------------------------------------
# MCP 服务器配置
# ----------------------------------------------------------------------------
mcp:
  servers: []
  max_header_bytes: 65536            # MCP stdio header 上限（64KB）
  max_message_bytes: 16777216        # 单条 MCP JSON-RPC 消息上限（16MB）
  max_stderr_bytes: 262144           # 每个 MCP 会话保留的 stderr 上限（256KB）
  # - name: filesystem
  #   command: npx
  #   args: ["-y", "@modelcontextprotocol/server-filesystem", "/path/to/dir"]
  #   # Cloud default: downstream-supplied path/file args are blocked from
  #   # targeting the Gateway service filesystem. Enable only for an
  #   # admin-approved service-side filesystem connector.
  #   allow_service_file_arguments: true
  marketplace_enabled: true

# ----------------------------------------------------------------------------
# HTTP Actions（外部 API 作为工具）
# ----------------------------------------------------------------------------
http_actions:
  enabled: true
  actions: []
  # - name: lookup_user
  #   method: POST
  #   url: http://127.0.0.1:9000/lookup
  #   # Cloud default blocks private/localhost URLs; enable only for
  #   # admin-approved service-private action endpoints.
  #   allow_private_network: true
  #   input_schema:
  #     type: object
  #     properties:
  #       id:
  #         type: string
